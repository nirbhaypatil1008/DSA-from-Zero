<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - DSA From Zero</title>


  <link rel="stylesheet" href="login.css">
</head>

<body>


  <div class="left">
    <div>
      <h1>Start Your DSA Journey </h1>
      <p>Learn step-by-step and become placement ready</p>
      <br>
      <p>Founder Nirbhay Udaykumar Patil</p>
      <br>
      <p>Co-Founder Chat-GPT From open AI</p>
    </div>
  </div>


  <div class="right">
    <div class="login-box">

      <h2>Login</h2>

      <input type="email" id="email" placeholder="Enter email" required />

      <div class="password-box">
        <input type="password" id="password" placeholder="Enter password" required />
        <span class="toggle" onclick="togglePassword()">Show</span>
      </div>

      <button onclick="login()">Login</button>

      <div class="signup">
        Don’t have an account? <span>Sign up</span>
      </div>

    </div>
  </div>


  <script src="login.js"></script>
  <script src="server.js"></script>

</body>
</html>
